<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Obscura Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a1a1a;
        --card-bg: #f9fafb;
        --border: #e5e7eb;
        --primary: #4984b8;
        --primary-hover: #3b719f;
      }
      [data-theme="dark"] {
        --bg: #1a1a1a;
        --text: #e5e5e5;
        --card-bg: #1e1e1e;
        --border: #333333;
        --primary: #6da2d0;
        --primary-hover: #8cb6dd;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        max-width: 500px;
        width: 100%;
        text-align: center;
      }
      .btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.75rem 1.5rem;
        margin-top: 1rem;
        font-size: 1rem;
        font-weight: 500;
        color: #ffffff;
        background-color: var(--primary);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }
      .btn:hover {
        background-color: var(--primary-hover);
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn:disabled {
        background-color: #6b7280;
        cursor: not-allowed;
      }
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
        background-color: #333333;
        color: #ffffff;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        pointer-events: none;
        z-index: 1000;
        white-space: pre-wrap;
        text-align: center;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast.success { background-color: #10b981; }
      .toast.error { background-color: #ef4444; }
      .alert {
        background-color: #fef2f2;
        color: #991b1b;
        border: 1px solid #f87171;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        text-align: center;
        max-width: 500px;
        width: 100%;
        box-sizing: border-box;
      }
      [data-theme="dark"] .alert {
        background-color: #450a0a;
        color: #fca5a5;
        border-color: #7f1d1d;
      }
      .hidden {
        display: none !important;
      }
      .title {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
      }
      .desc {
        color: #9ca3af;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="flex flex-col items-center justify-center w-full max-w-[500px]">
      <div id="alert" class="alert hidden"></div>
      
      <div class="card">
        <img src="./icon-512.png" alt="Obscura Logo" class="mx-auto w-32 h-32 mb-6">
      
      <button id="btn-webui" class="btn">
        <img src="./planet_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="planet" class="w-5 h-5">
        WebUI
      </button>
      <button id="btn-cli" class="btn">
        <img src="./terminal_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="terminal" class="w-5 h-5">
        CLI
      </button>
      
    </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
      const bridge = window.AstrBotPluginPage;
      const toastEl = document.getElementById("toast");
      const btnWebUI = document.getElementById("btn-webui");
      const btnCLI = document.getElementById("btn-cli");

      // Theming sync
      function render() {
        // AstrBot SDK handles the data-theme attribute on <html> automatically
      }
      
      let toastTimeout;
      function showToast(message, type = 'success') {
        toastEl.textContent = message;
        toastEl.className = 'toast show ' + type;
        
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
          toastEl.classList.remove('show');
        }, 3000);
      }

      try {
        await bridge.ready();
        render();
        const off = bridge.onContext(render);
        window.addEventListener("beforeunload", off);
      } catch (err) {
        const alertEl = document.getElementById("alert");
        alertEl.textContent = "未检测到 AstrBot 环境，这可能是在独立浏览器中打开的。";
        alertEl.classList.remove("hidden");
      }

      async function startProcess(endpoint, btn) {
        const originalHTML = btn.innerHTML;
        btn.disabled = true;
        const img = btn.querySelector('img');
        if (img) {
          btn.innerHTML = img.outerHTML + ' 启动中...';
        } else {
          btn.textContent = "启动中...";
        }
        
        try {
          // The endpoint uses the plugin name relative path. 
          // Example: launcher/start_webui
          const result = await bridge.apiPost("launcher/" + endpoint, {});
          
          if (result && result.status === "ok") {
            showToast(`[成功] ${result.message}\n请检查是否弹出了新的终端窗口。`, "success");
          } else {
            showToast(`[失败] ${result ? result.message : "未知错误"}`, "error");
          }
        } catch (error) {
          showToast(`[异常] ${error.message}`, "error");
        } finally {
          setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.disabled = false;
          }, 2000);
        }
      }

      btnWebUI.addEventListener("click", () => startProcess("start_webui", btnWebUI));
      btnCLI.addEventListener("click", () => startProcess("start_cli", btnCLI));
    </script>
  </body>
</html>
